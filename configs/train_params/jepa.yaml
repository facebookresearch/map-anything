defaults:
  - default

lr: 1e-04
min_lr: 1e-07

# Optimizer parameters specific to submodules
submodule_configs:
  # Encoder
  encoder:
    lr: 1e-05
    min_lr: 1e-08
    warmup_epochs: ${train_params.warmup_epochs}
    weight_decay: ${train_params.weight_decay}
    schedule_type: ${train_params.schedule_type}

# JEPA training mode
jepa: 
  # EMA target model parameters update settings
  ema: [0.996, 1.0]
  ema_ipe_scale: 1.0

